<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админка{% endblock %} — 168-ФЗ Бот</title>
    <link rel="stylesheet" href="/admin/static/admin.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">168-ФЗ Бот</div>
        <div class="navbar-menu">
            <a href="/admin/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/admin/users" class="nav-link {% if active == 'users' %}active{% endif %}">Юзеры</a>
            <a href="/admin/checks" class="nav-link {% if active == 'checks' %}active{% endif %}">Проверки</a>
            <a href="/admin/leads" class="nav-link {% if active == 'leads' %}active{% endif %}">Лиды</a>
        </div>
        <form action="/admin/logout" method="post" class="navbar-logout">
            <button type="submit" class="btn btn-sm">Выйти</button>
        </form>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
