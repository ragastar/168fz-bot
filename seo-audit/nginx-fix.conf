# ============================================================================
#  NGINX: исправление производительности и безопасности
#  Сайт: проверьвывеску.рф (xn--b1aaakc4awhjdoz3hm.xn--p1ai)
#  Дата: 2026-03-03
# ============================================================================
#
#  КУДА ВСТАВЛЯТЬ:
#  Этот фрагмент нужно вставить ВНУТРЬ блока server { } для порта 443
#  в файле /etc/nginx/sites-enabled/168fz-landing (или аналогичном).
#  Вставлять ПОСЛЕ строк ssl_certificate и ПЕРЕД блоками location.
#
#  ОЖИДАЕМЫЕ УЛУЧШЕНИЯ:
#  - Размер страницы: 46 КБ → ~12 КБ (gzip-сжатие, экономия ~74%)
#  - Повторные визиты: мгновенная загрузка (кеш браузера)
#  - Оценка безопасности: 15/100 → 90/100 (7 заголовков)
#  - Общий Technical SEO: 62/100 → ~82/100
#
#  ПРИМЕНЕНИЕ:
#    sudo nginx -t && sudo systemctl reload nginx
#
#  ВАЖНО: всегда сначала проверяйте конфиг через nginx -t !
# ============================================================================


# --------------------------------------------------------------------------
# 1. GZIP-СЖАТИЕ
# Уменьшает размер передаваемых данных в 3-4 раза.
# Браузер автоматически распаковывает — пользователь ничего не замечает.
# --------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;


# --------------------------------------------------------------------------
# 2. КЕШИРОВАНИЕ СТАТИЧЕСКИХ ФАЙЛОВ
# Браузер сохраняет CSS, JS, картинки и шрифты на 30 дней.
# При повторном визите страница загружается мгновенно.
# --------------------------------------------------------------------------
location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}


# --------------------------------------------------------------------------
# 3. ЗАГОЛОВКИ БЕЗОПАСНОСТИ (7 штук)
# Защита от XSS, clickjacking, MIME-sniffing, downgrade-атак и т.д.
# Каждый заголовок закрывает конкретную уязвимость.
# --------------------------------------------------------------------------

# Защита от встраивания сайта в iframe на чужих доменах (clickjacking)
add_header X-Frame-Options "SAMEORIGIN" always;

# Запрет браузеру «угадывать» MIME-тип файла (MIME-sniffing)
add_header X-Content-Type-Options "nosniff" always;

# Встроенный XSS-фильтр браузера (для старых браузеров)
add_header X-XSS-Protection "1; mode=block" always;

# Контроль передачи Referer — не утекают полные URL при переходах
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HSTS — браузер запоминает, что сайт работает только по HTTPS (1 год)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Запрет доступа к камере, микрофону, геолокации через браузерные API
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# CSP — белый список источников для скриптов, стилей, шрифтов и картинок
# Разрешены: сам сайт, Яндекс.Метрика, Google Fonts
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://mc.yandex.ru data:; connect-src 'self' https://mc.yandex.ru;" always;


# --------------------------------------------------------------------------
# 4. КАСТОМНАЯ СТРАНИЦА 404
# Вместо стандартной nginx-ошибки — наша страница с навигацией.
# Файл /var/www/168fz-landing/404.html нужно создать отдельно.
# --------------------------------------------------------------------------
error_page 404 /404.html;


# --------------------------------------------------------------------------
# 5. РЕДИРЕКТ /blog → /blog/ (trailing slash)
# Без этого /blog и /blog/ — два разных URL, что плохо для SEO
# (дублирование контента, размытие ссылочного веса).
# --------------------------------------------------------------------------
location = /blog {
    return 301 /blog/;
}
