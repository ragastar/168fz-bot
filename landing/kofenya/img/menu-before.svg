<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="mbLampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="35%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mbBulb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <pattern id="mbBrick" x="0" y="0" width="52" height="26" patternUnits="userSpaceOnUse">
      <rect width="52" height="26" fill="#2a1a10"/>
      <rect x="0" y="0" width="24" height="11" rx="1" fill="#3d2517" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="26" y="0" width="24" height="11" rx="1" fill="#3a2215" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="-13" y="13" width="24" height="11" rx="1" fill="#362013" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="13" y="13" width="24" height="11" rx="1" fill="#3b2316" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="39" y="13" width="24" height="11" rx="1" fill="#382114" stroke="#1a0f08" stroke-width="0.5"/>
    </pattern>
    <filter id="mbShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="mbRedGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ef4444" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0f0e17"/>

  <!-- Brick wall -->
  <rect x="0" y="0" width="800" height="600" fill="url(#mbBrick)"/>
  <rect x="0" y="0" width="800" height="600" fill="#0f0e17" opacity="0.15"/>

  <!-- Edison lamp - left side -->
  <g transform="translate(120, 0)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#292524" stroke-width="2.5"/>
    <!-- Fixture -->
    <rect x="-8" y="74" width="16" height="10" rx="3" fill="#44403c"/>
    <!-- Cord detail -->
    <rect x="-3" y="68" width="6" height="8" rx="1" fill="#57534e"/>
    <!-- Bulb glass -->
    <ellipse cx="0" cy="105" rx="16" ry="22" fill="url(#mbBulb)" opacity="0.85"/>
    <!-- Filament -->
    <path d="M-5 96 Q0 103 5 96" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.8"/>
    <path d="M-4 100 Q0 107 4 100" fill="none" stroke="#fef3c7" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="88" x2="0" y2="95" stroke="#fef3c7" stroke-width="0.6" opacity="0.5"/>
    <!-- Glow -->
    <ellipse cx="0" cy="105" rx="150" ry="140" fill="url(#mbLampGlow)"/>
  </g>

  <!-- === CHALKBOARD === -->
  <g transform="translate(200, 60)" filter="url(#mbShadow)">
    <!-- Board outer frame -->
    <rect x="-12" y="-12" width="524" height="484" rx="4" fill="#5c3a1e"/>
    <!-- Inner frame bevel -->
    <rect x="-6" y="-6" width="512" height="472" rx="3" fill="#4a2e16"/>
    <!-- Board surface -->
    <rect x="0" y="0" width="500" height="460" rx="2" fill="#1c1c1c"/>
    <!-- Chalk dust effect -->
    <rect x="0" y="0" width="500" height="460" rx="2" fill="#faf5eb" opacity="0.025"/>
    <!-- Smudge marks for realism -->
    <ellipse cx="380" cy="400" rx="40" ry="20" fill="#faf5eb" opacity="0.015" transform="rotate(-15, 380, 400)"/>
    <ellipse cx="100" cy="50" rx="30" ry="15" fill="#faf5eb" opacity="0.01" transform="rotate(10, 100, 50)"/>

    <!-- Title with decorative elements -->
    <text x="250" y="45" font-family="system-ui" font-size="26" font-weight="700" fill="#fef3c7" text-anchor="middle" letter-spacing="6">MENU</text>
    <!-- Decorative lines under title -->
    <line x1="80" y1="58" x2="170" y2="58" stroke="#fef3c7" stroke-width="0.8" opacity="0.3"/>
    <line x1="330" y1="58" x2="420" y2="58" stroke="#fef3c7" stroke-width="0.8" opacity="0.3"/>
    <text x="250" y="62" font-family="system-ui" font-size="8" fill="#fef3c7" text-anchor="middle" opacity="0.3">&#9830;</text>

    <!-- Coffee cup doodle -->
    <g transform="translate(430, 20)" opacity="0.2">
      <path d="M0 15 Q0 0 15 0 Q30 0 30 15 L28 25 L2 25 Z" fill="none" stroke="#fef3c7" stroke-width="1"/>
      <path d="M30 8 Q40 8 40 15 Q40 22 30 22" fill="none" stroke="#fef3c7" stroke-width="1"/>
      <path d="M8 -5 Q10 -12 12 -5 M14 -3 Q16 -10 18 -3 M20 -5 Q22 -12 24 -5" fill="none" stroke="#fef3c7" stroke-width="0.8"/>
    </g>

    <!-- Section: DRINKS -->
    <text x="40" y="95" font-family="system-ui" font-size="14" font-weight="600" fill="#d97706" letter-spacing="2">DRINKS</text>
    <line x1="40" y1="102" x2="460" y2="102" stroke="#fef3c7" stroke-width="0.3" opacity="0.2"/>

    <!-- Espresso -->
    <text x="40" y="140" font-family="system-ui" font-size="22" font-weight="700" fill="#fefce8">Espresso</text>
    <text x="460" y="140" font-family="system-ui" font-size="20" fill="#fbbf24" text-anchor="end">180 &#8381;</text>
    <!-- Dotted line between name and price -->
    <line x1="175" y1="138" x2="395" y2="138" stroke="#fef3c7" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.15"/>

    <!-- Latte -->
    <text x="40" y="182" font-family="system-ui" font-size="22" font-weight="700" fill="#fefce8">Latte</text>
    <text x="460" y="182" font-family="system-ui" font-size="20" fill="#fbbf24" text-anchor="end">280 &#8381;</text>
    <line x1="120" y1="180" x2="395" y2="180" stroke="#fef3c7" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.15"/>

    <!-- Flat White -->
    <text x="40" y="224" font-family="system-ui" font-size="22" font-weight="700" fill="#fefce8">Flat White</text>
    <text x="460" y="224" font-family="system-ui" font-size="20" fill="#fbbf24" text-anchor="end">320 &#8381;</text>
    <line x1="195" y1="222" x2="395" y2="222" stroke="#fef3c7" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.15"/>

    <!-- Cappuccino -->
    <text x="40" y="266" font-family="system-ui" font-size="22" font-weight="700" fill="#fefce8">Cappuccino</text>
    <text x="460" y="266" font-family="system-ui" font-size="20" fill="#fbbf24" text-anchor="end">250 &#8381;</text>
    <line x1="210" y1="264" x2="395" y2="264" stroke="#fef3c7" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.15"/>

    <!-- Divider with decoration -->
    <line x1="40" y1="290" x2="460" y2="290" stroke="#fef3c7" stroke-width="0.8" opacity="0.25"/>
    <text x="250" y="294" font-family="system-ui" font-size="8" fill="#fef3c7" text-anchor="middle" opacity="0.25">&#9830;</text>

    <!-- Section: FOOD -->
    <text x="40" y="325" font-family="system-ui" font-size="14" font-weight="600" fill="#d97706" letter-spacing="2">FOOD</text>
    <line x1="40" y1="332" x2="460" y2="332" stroke="#fef3c7" stroke-width="0.3" opacity="0.2"/>

    <!-- Croissant -->
    <text x="40" y="365" font-family="system-ui" font-size="22" font-weight="700" fill="#fefce8">Croissant</text>
    <text x="460" y="365" font-family="system-ui" font-size="20" fill="#fbbf24" text-anchor="end">200 &#8381;</text>
    <line x1="185" y1="363" x2="395" y2="363" stroke="#fef3c7" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.15"/>

    <!-- Cheesecake -->
    <text x="40" y="407" font-family="system-ui" font-size="22" font-weight="700" fill="#fefce8">Cheesecake</text>
    <text x="460" y="407" font-family="system-ui" font-size="20" fill="#fbbf24" text-anchor="end">350 &#8381;</text>
    <line x1="210" y1="405" x2="395" y2="405" stroke="#fef3c7" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.15"/>

    <!-- Chalk tray at bottom -->
    <rect x="-2" y="460" width="504" height="10" rx="2" fill="#4a2e16"/>
    <!-- Chalk pieces in tray -->
    <rect x="30" y="462" width="25" height="5" rx="2" fill="#e7e5e4" opacity="0.6" transform="rotate(-5, 42, 464)"/>
    <rect x="70" y="463" width="18" height="4" rx="2" fill="#fbbf24" opacity="0.5" transform="rotate(3, 79, 465)"/>
    <rect x="200" y="462" width="20" height="5" rx="2" fill="#e7e5e4" opacity="0.4"/>
  </g>

  <!-- === RED WARNING INDICATOR === -->
  <g transform="translate(650, 30)" filter="url(#mbRedGlow)">
    <rect x="0" y="0" width="120" height="48" rx="24" fill="#1f1215" stroke="#ef4444" stroke-width="2"/>
    <circle cx="28" cy="24" r="10" fill="#ef4444" opacity="0.2"/>
    <text x="28" y="29" font-family="system-ui" font-size="16" fill="#ef4444" text-anchor="middle">&#10007;</text>
    <text x="75" y="21" font-family="system-ui" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">НАРУШЕНИЕ</text>
    <text x="75" y="35" font-family="system-ui" font-size="9" fill="#fca5a5" text-anchor="middle">168-ФЗ</text>
  </g>

  <!-- Warm ambient light from lamp -->
  <rect x="0" y="0" width="250" height="600" fill="#f59e0b" opacity="0.03"/>
</svg>