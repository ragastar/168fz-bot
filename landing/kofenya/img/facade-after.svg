<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="faWindowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="faBrick" x="0" y="0" width="48" height="24" patternUnits="userSpaceOnUse">
      <rect width="48" height="24" fill="#2a1a10"/>
      <rect x="0" y="0" width="22" height="10" rx="1" fill="#3d2517" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="24" y="0" width="22" height="10" rx="1" fill="#3a2215" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="-12" y="12" width="22" height="10" rx="1" fill="#362013" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="12" y="12" width="22" height="10" rx="1" fill="#3b2316" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="36" y="12" width="22" height="10" rx="1" fill="#382114" stroke="#1a0f08" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="faSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="faSidewalk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="faLightbox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <filter id="faShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="faGreenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22c55e" flood-opacity="0.4"/>
    </filter>
    <filter id="faTextGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffffff" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Evening sky -->
  <rect width="800" height="120" fill="url(#faSky)"/>
  <!-- Stars -->
  <circle cx="100" cy="30" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="250" cy="50" r="0.8" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="500" cy="25" r="1.2" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="650" cy="45" r="0.8" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="720" cy="15" r="1" fill="#e2e8f0" opacity="0.4"/>

  <!-- Building facade -->
  <rect x="80" y="80" width="640" height="380" fill="url(#faBrick)"/>
  <rect x="80" y="80" width="640" height="380" fill="#f59e0b" opacity="0.03"/>

  <!-- Cornice / roofline -->
  <rect x="70" y="75" width="660" height="12" rx="2" fill="#44403c"/>
  <rect x="75" y="82" width="650" height="4" fill="#57534e"/>

  <!-- === BILINGUAL LIGHTBOX SIGN === -->
  <g transform="translate(200, 95)" filter="url(#faShadow)">
    <rect x="0" y="0" width="400" height="80" rx="4" fill="url(#faLightbox)" stroke="#333" stroke-width="1.5"/>
    <!-- Backlight glow -->
    <rect x="5" y="5" width="390" height="70" rx="2" fill="#fefce8" opacity="0.03"/>
    <!-- Russian name - larger, on top -->
    <text x="200" y="38" font-family="system-ui" font-size="24" font-weight="800" fill="#fefce8" text-anchor="middle" letter-spacing="2" filter="url(#faTextGlow)">&#1050;&#1086;&#1092;&#1077;&#1081;&#1085;&#1072;&#1103; &#1083;&#1072;&#1073;&#1086;&#1088;&#1072;&#1090;&#1086;&#1088;&#1080;&#1103;</text>
    <!-- English name - below, smaller -->
    <text x="200" y="62" font-family="system-ui" font-size="16" font-weight="600" fill="#a8a29e" text-anchor="middle" letter-spacing="4">COFFEE LAB</text>
    <!-- Lightbox edge highlights -->
    <line x1="10" y1="2" x2="390" y2="2" stroke="#555" stroke-width="0.5"/>
    <line x1="10" y1="78" x2="390" y2="78" stroke="#222" stroke-width="0.5"/>
  </g>

  <!-- Sign glow on wall -->
  <ellipse cx="400" cy="135" rx="250" ry="60" fill="#fefce8" opacity="0.04"/>

  <!-- === LARGE WINDOW === -->
  <g transform="translate(160, 200)">
    <!-- Window frame -->
    <rect x="-5" y="-5" width="370" height="225" rx="2" fill="#44403c"/>
    <!-- Glass -->
    <rect x="0" y="0" width="360" height="215" fill="#1a0f08" opacity="0.7"/>
    <!-- Warm glow from inside -->
    <rect x="0" y="0" width="360" height="215" fill="url(#faWindowGlow)"/>
    <!-- Interior silhouettes -->
    <rect x="20" y="135" width="320" height="30" rx="3" fill="#3d2517" opacity="0.5"/>
    <ellipse cx="100" cy="60" rx="8" ry="12" fill="#fbbf24" opacity="0.2"/>
    <line x1="100" y1="0" x2="100" y2="50" stroke="#292524" stroke-width="1.5" opacity="0.3"/>
    <ellipse cx="260" cy="60" rx="8" ry="12" fill="#fbbf24" opacity="0.2"/>
    <line x1="260" y1="0" x2="260" y2="50" stroke="#292524" stroke-width="1.5" opacity="0.3"/>
    <rect x="40" y="90" width="12" height="35" rx="3" fill="#292524" opacity="0.3"/>
    <rect x="60" y="95" width="12" height="30" rx="3" fill="#292524" opacity="0.3"/>
    <rect x="80" y="88" width="12" height="37" rx="3" fill="#292524" opacity="0.3"/>
    <!-- Window mullion -->
    <rect x="178" y="0" width="4" height="215" fill="#44403c"/>
    <!-- Window reflections -->
    <line x1="30" y1="20" x2="30" y2="175" stroke="#fefce8" stroke-width="0.5" opacity="0.05"/>
    <line x1="210" y1="20" x2="210" y2="175" stroke="#fefce8" stroke-width="0.5" opacity="0.05"/>
  </g>

  <!-- === ENTRANCE DOOR === -->
  <g transform="translate(560, 200)">
    <rect x="-5" y="-5" width="120" height="265" rx="2" fill="#44403c"/>
    <rect x="0" y="0" width="110" height="255" fill="#3d2517"/>
    <rect x="10" y="10" width="90" height="120" rx="2" fill="#1a0f08" opacity="0.6"/>
    <rect x="10" y="10" width="90" height="120" rx="2" fill="url(#faWindowGlow)" opacity="0.6"/>
    <!-- Door handle -->
    <rect x="85" y="155" width="8" height="40" rx="4" fill="#a8a29e"/>
    <!-- OPEN sign in Russian -->
    <rect x="20" y="45" width="70" height="25" rx="3" fill="#1a1a1a" stroke="#d97706" stroke-width="1"/>
    <text x="55" y="62" font-family="system-ui" font-size="12" font-weight="700" fill="#d97706" text-anchor="middle">&#1054;&#1058;&#1050;&#1056;&#1067;&#1058;&#1054;</text>
    <!-- Door step -->
    <rect x="-10" y="255" width="130" height="8" rx="1" fill="#57534e"/>
  </g>

  <!-- === SANDWICH BOARD - RUSSIAN === -->
  <g transform="translate(100, 340)">
    <!-- A-frame legs -->
    <line x1="10" y1="0" x2="0" y2="130" stroke="#78350f" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="0" x2="110" y2="130" stroke="#78350f" stroke-width="4" stroke-linecap="round"/>
    <!-- Hinge -->
    <rect x="45" y="-3" width="20" height="8" rx="2" fill="#92400e"/>
    <!-- Board surface -->
    <rect x="8" y="8" width="94" height="100" rx="3" fill="#1c1c1c" stroke="#5c3a1e" stroke-width="2"/>
    <!-- Chalk text - Russian -->
    <text x="55" y="32" font-family="system-ui" font-size="10" font-weight="600" fill="#fef3c7" text-anchor="middle">&#1053;&#1072;&#1087;&#1080;&#1090;&#1086;&#1082; &#1076;&#1085;&#1103;:</text>
    <text x="55" y="55" font-family="system-ui" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">&#1060;&#1083;&#1101;&#1090; &#1059;&#1072;&#1081;&#1090;</text>
    <text x="55" y="78" font-family="system-ui" font-size="18" font-weight="800" fill="#fefce8" text-anchor="middle">250 &#8381;</text>
    <text x="55" y="96" font-family="system-ui" font-size="8" fill="#fef3c7" text-anchor="middle" opacity="0.3">&#9733; &#9733; &#9733;</text>
  </g>

  <!-- === SIDEWALK === -->
  <rect x="0" y="460" width="800" height="140" fill="url(#faSidewalk)"/>
  <line x1="0" y1="460" x2="800" y2="460" stroke="#3f3f46" stroke-width="1"/>
  <line x1="0" y1="490" x2="800" y2="490" stroke="#27272a" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#27272a" stroke-width="0.5" opacity="0.3"/>

  <!-- === OUTDOOR TABLES === -->
  <g transform="translate(560, 445)">
    <ellipse cx="30" cy="0" rx="30" ry="8" fill="#57534e" stroke="#44403c" stroke-width="1"/>
    <line x1="30" y1="8" x2="30" y2="45" stroke="#44403c" stroke-width="3"/>
    <ellipse cx="30" cy="45" rx="15" ry="4" fill="#44403c"/>
    <rect x="-10" y="15" width="18" height="18" rx="2" fill="#44403c" stroke="#3f3f46" stroke-width="0.5"/>
    <rect x="-10" y="0" width="18" height="18" rx="2" fill="#57534e" stroke="#44403c" stroke-width="0.5"/>
    <rect x="52" y="15" width="18" height="18" rx="2" fill="#44403c" stroke="#3f3f46" stroke-width="0.5"/>
    <rect x="52" y="0" width="18" height="18" rx="2" fill="#57534e" stroke="#44403c" stroke-width="0.5"/>
  </g>

  <g transform="translate(680, 455)">
    <ellipse cx="25" cy="0" rx="25" ry="7" fill="#57534e" stroke="#44403c" stroke-width="1"/>
    <line x1="25" y1="7" x2="25" y2="40" stroke="#44403c" stroke-width="3"/>
    <ellipse cx="25" cy="40" rx="12" ry="3" fill="#44403c"/>
    <rect x="-8" y="12" width="16" height="16" rx="2" fill="#57534e" stroke="#44403c" stroke-width="0.5"/>
    <rect x="42" y="12" width="16" height="16" rx="2" fill="#57534e" stroke="#44403c" stroke-width="0.5"/>
  </g>

  <!-- Light spill from window onto sidewalk -->
  <polygon points="160,460 520,460 560,540 120,540" fill="#f59e0b" opacity="0.04"/>

  <!-- === GREEN SUCCESS INDICATOR === -->
  <g transform="translate(650, 30)" filter="url(#faGreenGlow)">
    <rect x="0" y="0" width="120" height="48" rx="24" fill="#0f2918" stroke="#22c55e" stroke-width="2"/>
    <circle cx="28" cy="24" r="10" fill="#22c55e" opacity="0.2"/>
    <text x="28" y="29" font-family="system-ui" font-size="16" fill="#22c55e" text-anchor="middle">&#10003;</text>
    <text x="75" y="21" font-family="system-ui" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle">&#1057;&#1054;&#1054;&#1058;&#1042;&#1045;&#1058;&#1057;&#1058;&#1042;&#1059;&#1045;&#1058;</text>
    <text x="75" y="35" font-family="system-ui" font-size="9" fill="#86efac" text-anchor="middle">168-&#1060;&#1047;</text>
  </g>
</svg>