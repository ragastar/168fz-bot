<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="fbWindowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fbStreetLamp" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="fbBrick" x="0" y="0" width="48" height="24" patternUnits="userSpaceOnUse">
      <rect width="48" height="24" fill="#2a1a10"/>
      <rect x="0" y="0" width="22" height="10" rx="1" fill="#3d2517" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="24" y="0" width="22" height="10" rx="1" fill="#3a2215" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="-12" y="12" width="22" height="10" rx="1" fill="#362013" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="12" y="12" width="22" height="10" rx="1" fill="#3b2316" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="36" y="12" width="22" height="10" rx="1" fill="#382114" stroke="#1a0f08" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fbSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="fbSidewalk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="fbLightbox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <filter id="fbShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="fbRedGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ef4444" flood-opacity="0.4"/>
    </filter>
    <filter id="fbSignGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="fbTextGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffffff" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Evening sky -->
  <rect width="800" height="120" fill="url(#fbSky)"/>
  <!-- Stars -->
  <circle cx="100" cy="30" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="250" cy="50" r="0.8" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="500" cy="25" r="1.2" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="650" cy="45" r="0.8" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="720" cy="15" r="1" fill="#e2e8f0" opacity="0.4"/>

  <!-- Building facade -->
  <rect x="80" y="80" width="640" height="380" fill="url(#fbBrick)"/>
  <!-- Brick warm overlay -->
  <rect x="80" y="80" width="640" height="380" fill="#f59e0b" opacity="0.03"/>

  <!-- Cornice / roofline -->
  <rect x="70" y="75" width="660" height="12" rx="2" fill="#44403c"/>
  <rect x="75" y="82" width="650" height="4" fill="#57534e"/>

  <!-- === LIGHTBOX SIGN === -->
  <g transform="translate(200, 100)" filter="url(#fbShadow)">
    <rect x="0" y="0" width="400" height="70" rx="4" fill="url(#fbLightbox)" stroke="#333" stroke-width="1.5"/>
    <!-- Backlight glow -->
    <rect x="5" y="5" width="390" height="60" rx="2" fill="#fefce8" opacity="0.03"/>
    <!-- Sign text - English only -->
    <text x="200" y="48" font-family="system-ui" font-size="36" font-weight="800" fill="#fefce8" text-anchor="middle" letter-spacing="6" filter="url(#fbTextGlow)">COFFEE LAB</text>
    <!-- Lightbox edge highlights -->
    <line x1="10" y1="2" x2="390" y2="2" stroke="#555" stroke-width="0.5"/>
    <line x1="10" y1="68" x2="390" y2="68" stroke="#222" stroke-width="0.5"/>
  </g>

  <!-- Sign glow on wall -->
  <ellipse cx="400" cy="135" rx="250" ry="60" fill="#fefce8" opacity="0.04"/>

  <!-- === LARGE WINDOW === -->
  <g transform="translate(160, 195)">
    <!-- Window frame -->
    <rect x="-5" y="-5" width="370" height="230" rx="2" fill="#44403c"/>
    <!-- Glass -->
    <rect x="0" y="0" width="360" height="220" fill="#1a0f08" opacity="0.7"/>
    <!-- Warm glow from inside -->
    <rect x="0" y="0" width="360" height="220" fill="url(#fbWindowGlow)"/>
    <!-- Interior silhouettes visible through window -->
    <!-- Counter inside -->
    <rect x="20" y="140" width="320" height="30" rx="3" fill="#3d2517" opacity="0.5"/>
    <!-- Lamp silhouettes inside -->
    <ellipse cx="100" cy="60" rx="8" ry="12" fill="#fbbf24" opacity="0.2"/>
    <line x1="100" y1="0" x2="100" y2="50" stroke="#292524" stroke-width="1.5" opacity="0.3"/>
    <ellipse cx="260" cy="60" rx="8" ry="12" fill="#fbbf24" opacity="0.2"/>
    <line x1="260" y1="0" x2="260" y2="50" stroke="#292524" stroke-width="1.5" opacity="0.3"/>
    <!-- Bottle silhouettes on shelf inside -->
    <rect x="40" y="90" width="12" height="35" rx="3" fill="#292524" opacity="0.3"/>
    <rect x="60" y="95" width="12" height="30" rx="3" fill="#292524" opacity="0.3"/>
    <rect x="80" y="88" width="12" height="37" rx="3" fill="#292524" opacity="0.3"/>
    <!-- Window mullion -->
    <rect x="178" y="0" width="4" height="220" fill="#44403c"/>
    <!-- Window reflection -->
    <line x1="30" y1="20" x2="30" y2="180" stroke="#fefce8" stroke-width="0.5" opacity="0.05"/>
    <line x1="210" y1="20" x2="210" y2="180" stroke="#fefce8" stroke-width="0.5" opacity="0.05"/>
  </g>

  <!-- === ENTRANCE DOOR === -->
  <g transform="translate(560, 195)">
    <!-- Door frame -->
    <rect x="-5" y="-5" width="120" height="270" rx="2" fill="#44403c"/>
    <!-- Door panels -->
    <rect x="0" y="0" width="110" height="260" fill="#3d2517"/>
    <!-- Door glass upper panel -->
    <rect x="10" y="10" width="90" height="120" rx="2" fill="#1a0f08" opacity="0.6"/>
    <rect x="10" y="10" width="90" height="120" rx="2" fill="url(#fbWindowGlow)" opacity="0.6"/>
    <!-- Door handle -->
    <rect x="85" y="155" width="8" height="40" rx="4" fill="#a8a29e"/>
    <!-- OPEN sign on door -->
    <rect x="25" y="45" width="60" height="25" rx="3" fill="#1a1a1a" stroke="#d97706" stroke-width="1"/>
    <text x="55" y="62" font-family="system-ui" font-size="12" font-weight="700" fill="#d97706" text-anchor="middle">OPEN</text>
    <!-- Door step -->
    <rect x="-10" y="260" width="130" height="8" rx="1" fill="#57534e"/>
  </g>

  <!-- === SANDWICH BOARD / SHTENDER === -->
  <g transform="translate(100, 340)">
    <!-- A-frame legs -->
    <line x1="10" y1="0" x2="0" y2="130" stroke="#78350f" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="0" x2="110" y2="130" stroke="#78350f" stroke-width="4" stroke-linecap="round"/>
    <!-- Hinge -->
    <rect x="45" y="-3" width="20" height="8" rx="2" fill="#92400e"/>
    <!-- Board surface -->
    <rect x="8" y="8" width="94" height="100" rx="3" fill="#1c1c1c" stroke="#5c3a1e" stroke-width="2"/>
    <!-- Chalk text - English only -->
    <text x="55" y="32" font-family="system-ui" font-size="10" font-weight="600" fill="#fef3c7" text-anchor="middle">Today's special:</text>
    <text x="55" y="55" font-family="system-ui" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">Flat White</text>
    <text x="55" y="78" font-family="system-ui" font-size="18" font-weight="800" fill="#fefce8" text-anchor="middle">250 &#8381;</text>
    <!-- Small decoration -->
    <text x="55" y="96" font-family="system-ui" font-size="8" fill="#fef3c7" text-anchor="middle" opacity="0.3">&#9733; &#9733; &#9733;</text>
  </g>

  <!-- === SIDEWALK === -->
  <rect x="0" y="460" width="800" height="140" fill="url(#fbSidewalk)"/>
  <!-- Sidewalk tiles -->
  <line x1="0" y1="460" x2="800" y2="460" stroke="#3f3f46" stroke-width="1"/>
  <line x1="0" y1="490" x2="800" y2="490" stroke="#27272a" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#27272a" stroke-width="0.5" opacity="0.3"/>

  <!-- === OUTDOOR TABLES === -->
  <!-- Table 1 -->
  <g transform="translate(560, 445)">
    <!-- Table top -->
    <ellipse cx="30" cy="0" rx="30" ry="8" fill="#57534e" stroke="#44403c" stroke-width="1"/>
    <!-- Table leg -->
    <line x1="30" y1="8" x2="30" y2="45" stroke="#44403c" stroke-width="3"/>
    <!-- Base -->
    <ellipse cx="30" cy="45" rx="15" ry="4" fill="#44403c"/>
    <!-- Chair 1 -->
    <rect x="-10" y="15" width="18" height="18" rx="2" fill="#44403c" stroke="#3f3f46" stroke-width="0.5"/>
    <rect x="-10" y="0" width="18" height="18" rx="2" fill="#57534e" stroke="#44403c" stroke-width="0.5"/>
    <!-- Chair 2 -->
    <rect x="52" y="15" width="18" height="18" rx="2" fill="#44403c" stroke="#3f3f46" stroke-width="0.5"/>
    <rect x="52" y="0" width="18" height="18" rx="2" fill="#57534e" stroke="#44403c" stroke-width="0.5"/>
  </g>

  <!-- Table 2 -->
  <g transform="translate(680, 455)">
    <ellipse cx="25" cy="0" rx="25" ry="7" fill="#57534e" stroke="#44403c" stroke-width="1"/>
    <line x1="25" y1="7" x2="25" y2="40" stroke="#44403c" stroke-width="3"/>
    <ellipse cx="25" cy="40" rx="12" ry="3" fill="#44403c"/>
    <rect x="-8" y="12" width="16" height="16" rx="2" fill="#57534e" stroke="#44403c" stroke-width="0.5"/>
    <rect x="42" y="12" width="16" height="16" rx="2" fill="#57534e" stroke="#44403c" stroke-width="0.5"/>
  </g>

  <!-- Light spill from window onto sidewalk -->
  <polygon points="160,460 520,460 560,540 120,540" fill="#f59e0b" opacity="0.04"/>

  <!-- === RED WARNING INDICATOR === -->
  <g transform="translate(650, 30)" filter="url(#fbRedGlow)">
    <rect x="0" y="0" width="120" height="48" rx="24" fill="#1f1215" stroke="#ef4444" stroke-width="2"/>
    <circle cx="28" cy="24" r="10" fill="#ef4444" opacity="0.2"/>
    <text x="28" y="29" font-family="system-ui" font-size="16" fill="#ef4444" text-anchor="middle">&#10007;</text>
    <text x="75" y="21" font-family="system-ui" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">НАРУШЕНИЕ</text>
    <text x="75" y="35" font-family="system-ui" font-size="9" fill="#fca5a5" text-anchor="middle">168-ФЗ</text>
  </g>
</svg>