<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" width="1440" height="600">
  <defs>
    <radialGradient id="lampGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="35%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampBulb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <linearGradient id="counterTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="50%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="counterFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c2d0e"/>
      <stop offset="100%" stop-color="#3b1a08"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="shelfGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#5c1d08"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <pattern id="brickPattern" x="0" y="0" width="60" height="30" patternUnits="userSpaceOnUse">
      <rect width="60" height="30" fill="#2a1a10"/>
      <rect x="0" y="0" width="28" height="13" rx="1" fill="#3d2517" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="30" y="0" width="28" height="13" rx="1" fill="#3a2215" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="-15" y="15" width="28" height="13" rx="1" fill="#362013" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="15" y="15" width="28" height="13" rx="1" fill="#3b2316" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="45" y="15" width="28" height="13" rx="1" fill="#382114" stroke="#1a0f08" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="machineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="30%" stop-color="#78716c"/>
      <stop offset="100%" stop-color="#44403c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="600" fill="#0f0e17"/>

  <!-- Brick wall -->
  <rect x="0" y="0" width="1440" height="420" fill="url(#brickPattern)"/>

  <!-- Ambient warm overlay on wall -->
  <rect x="0" y="0" width="1440" height="420" fill="#f59e0b" opacity="0.04"/>

  <!-- Floor -->
  <rect x="0" y="420" width="1440" height="180" fill="url(#floorGrad)"/>
  <!-- Floor line -->
  <line x1="0" y1="420" x2="1440" y2="420" stroke="#1a0f08" stroke-width="2"/>

  <!-- Shelves on back wall -->
  <!-- Shelf 1 -->
  <rect x="100" y="100" width="280" height="8" rx="2" fill="url(#shelfGrad)" filter="url(#shadow)"/>
  <!-- Coffee bags on shelf 1 -->
  <rect x="115" y="55" width="35" height="45" rx="3" fill="#78350f" stroke="#92400e" stroke-width="1"/>
  <text x="132" y="82" font-family="system-ui" font-size="6" fill="#d4a574" text-anchor="middle">KENYA</text>
  <rect x="158" y="60" width="35" height="40" rx="3" fill="#5c2d0e" stroke="#7c3e1a" stroke-width="1"/>
  <text x="175" y="84" font-family="system-ui" font-size="6" fill="#d4a574" text-anchor="middle">BRAZIL</text>
  <rect x="200" y="52" width="35" height="48" rx="3" fill="#6b3410" stroke="#8b4a1e" stroke-width="1"/>
  <text x="217" y="80" font-family="system-ui" font-size="6" fill="#d4a574" text-anchor="middle">ETHIOPIA</text>
  <rect x="245" y="58" width="35" height="42" rx="3" fill="#713812" stroke="#915020" stroke-width="1"/>
  <text x="262" y="83" font-family="system-ui" font-size="6" fill="#d4a574" text-anchor="middle">COLOMBIA</text>
  <rect x="290" y="55" width="35" height="45" rx="3" fill="#5f2e0d" stroke="#7f4e1d" stroke-width="1"/>
  <text x="307" y="82" font-family="system-ui" font-size="6" fill="#d4a574" text-anchor="middle">JAVA</text>
  <rect x="335" y="62" width="35" height="38" rx="3" fill="#6a3310" stroke="#8a531e" stroke-width="1"/>

  <!-- Shelf 2 -->
  <rect x="100" y="180" width="280" height="8" rx="2" fill="url(#shelfGrad)" filter="url(#shadow)"/>
  <!-- Cups on shelf 2 -->
  <g transform="translate(125,145)">
    <rect x="0" y="5" width="20" height="25" rx="2" fill="#d6d3d1" stroke="#a8a29e" stroke-width="0.5"/>
    <ellipse cx="10" cy="5" rx="10" ry="4" fill="#e7e5e4" stroke="#a8a29e" stroke-width="0.5"/>
    <path d="M20 12 Q28 12 28 18 Q28 24 20 24" fill="none" stroke="#a8a29e" stroke-width="1.5"/>
  </g>
  <g transform="translate(165,148)">
    <rect x="0" y="5" width="18" height="22" rx="2" fill="#e7e5e4" stroke="#a8a29e" stroke-width="0.5"/>
    <ellipse cx="9" cy="5" rx="9" ry="3.5" fill="#f5f5f4" stroke="#a8a29e" stroke-width="0.5"/>
  </g>
  <g transform="translate(200,145)">
    <rect x="0" y="5" width="20" height="25" rx="2" fill="#d6d3d1" stroke="#a8a29e" stroke-width="0.5"/>
    <ellipse cx="10" cy="5" rx="10" ry="4" fill="#e7e5e4" stroke="#a8a29e" stroke-width="0.5"/>
  </g>
  <!-- Grinder on shelf 2 -->
  <g transform="translate(260,130)">
    <rect x="5" y="25" width="30" height="20" rx="2" fill="#57534e"/>
    <rect x="10" y="10" width="20" height="18" rx="3" fill="#44403c"/>
    <rect x="15" y="2" width="10" height="10" rx="5" fill="#78716c"/>
    <circle cx="20" cy="7" r="3" fill="#a8a29e"/>
  </g>

  <!-- === CHALKBOARD MENU === -->
  <g transform="translate(450, 40)">
    <!-- Board frame -->
    <rect x="-8" y="-8" width="556" height="336" rx="4" fill="#5c3a1e"/>
    <!-- Board surface -->
    <rect x="0" y="0" width="540" height="320" rx="2" fill="#1a1a1a"/>
    <!-- Chalk dust texture -->
    <rect x="0" y="0" width="540" height="320" rx="2" fill="#e7e5e4" opacity="0.03"/>

    <!-- Title -->
    <text x="270" y="40" font-family="system-ui" font-size="22" font-weight="700" fill="#fef3c7" text-anchor="middle" letter-spacing="3">M E N U</text>
    <line x1="60" y1="52" x2="480" y2="52" stroke="#fef3c7" stroke-width="0.5" opacity="0.3"/>

    <!-- Coffee section -->
    <text x="40" y="85" font-family="system-ui" font-size="13" font-weight="700" fill="#d97706" letter-spacing="1">-- COFFEE / КОФЕ --</text>

    <!-- Item 1 -->
    <text x="40" y="115" font-family="system-ui" font-size="17" font-weight="700" fill="#fefce8">Эспрессо / Espresso</text>
    <text x="500" y="115" font-family="system-ui" font-size="15" fill="#fbbf24" text-anchor="end">180 &#8381;</text>

    <!-- Item 2 -->
    <text x="40" y="145" font-family="system-ui" font-size="17" font-weight="700" fill="#fefce8">Латте / Latte</text>
    <text x="500" y="145" font-family="system-ui" font-size="15" fill="#fbbf24" text-anchor="end">280 &#8381;</text>

    <!-- Item 3 -->
    <text x="40" y="175" font-family="system-ui" font-size="17" font-weight="700" fill="#fefce8">Капучино / Cappuccino</text>
    <text x="500" y="175" font-family="system-ui" font-size="15" fill="#fbbf24" text-anchor="end">250 &#8381;</text>

    <!-- Item 4 -->
    <text x="40" y="205" font-family="system-ui" font-size="17" font-weight="700" fill="#fefce8">Флэт Уайт / Flat White</text>
    <text x="500" y="205" font-family="system-ui" font-size="15" fill="#fbbf24" text-anchor="end">320 &#8381;</text>

    <!-- Divider -->
    <line x1="40" y1="222" x2="500" y2="222" stroke="#fef3c7" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 3"/>

    <!-- Food section -->
    <text x="40" y="248" font-family="system-ui" font-size="13" font-weight="700" fill="#d97706" letter-spacing="1">-- FOOD / ЕДА --</text>

    <!-- Item 5 -->
    <text x="40" y="278" font-family="system-ui" font-size="17" font-weight="700" fill="#fefce8">Круассан / Croissant</text>
    <text x="500" y="278" font-family="system-ui" font-size="15" fill="#fbbf24" text-anchor="end">200 &#8381;</text>

    <!-- Item 6 -->
    <text x="40" y="308" font-family="system-ui" font-size="17" font-weight="700" fill="#fefce8">Чизкейк / Cheesecake</text>
    <text x="500" y="308" font-family="system-ui" font-size="15" fill="#fbbf24" text-anchor="end">350 &#8381;</text>
  </g>

  <!-- === COUNTER === -->
  <!-- Counter top surface -->
  <rect x="0" y="380" width="1440" height="12" rx="2" fill="url(#counterTop)"/>
  <!-- Counter front panel -->
  <rect x="0" y="392" width="1440" height="80" fill="url(#counterFront)"/>
  <!-- Counter wood grain lines -->
  <line x1="0" y1="410" x2="1440" y2="410" stroke="#4a2008" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="430" x2="1440" y2="430" stroke="#4a2008" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="450" x2="1440" y2="450" stroke="#4a2008" stroke-width="0.5" opacity="0.3"/>
  <!-- Counter edge highlight -->
  <line x1="0" y1="380" x2="1440" y2="380" stroke="#a16207" stroke-width="1" opacity="0.4"/>

  <!-- === ESPRESSO MACHINE === -->
  <g transform="translate(180, 260)">
    <!-- Machine body -->
    <rect x="0" y="40" width="120" height="110" rx="6" fill="url(#machineGrad)"/>
    <!-- Machine top -->
    <rect x="-5" y="30" width="130" height="15" rx="3" fill="#a8a29e"/>
    <!-- Cup warming tray -->
    <rect x="5" y="10" width="110" height="22" rx="4" fill="#57534e"/>
    <!-- Small cups on tray -->
    <rect x="15" y="12" width="14" height="16" rx="2" fill="#d6d3d1"/>
    <rect x="33" y="14" width="14" height="14" rx="2" fill="#e7e5e4"/>
    <rect x="51" y="12" width="14" height="16" rx="2" fill="#d6d3d1"/>
    <!-- Portafilter holder -->
    <rect x="25" y="90" width="70" height="10" rx="2" fill="#292524"/>
    <!-- Portafilter handle -->
    <rect x="95" y="85" width="35" height="6" rx="3" fill="#1c1917"/>
    <!-- Drip tray -->
    <rect x="20" y="120" width="80" height="8" rx="2" fill="#292524"/>
    <rect x="25" y="121" width="70" height="6" rx="1" fill="#1c1917"/>
    <!-- Gauge -->
    <circle cx="60" cy="65" r="15" fill="#292524" stroke="#57534e" stroke-width="1.5"/>
    <circle cx="60" cy="65" r="11" fill="#1c1917"/>
    <line x1="60" y1="65" x2="68" y2="58" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="60" cy="65" r="2" fill="#ef4444"/>
    <!-- Steam wand -->
    <line x1="10" y1="50" x2="-15" y2="130" stroke="#a8a29e" stroke-width="4" stroke-linecap="round"/>
    <!-- Brand plate -->
    <rect x="30" y="100" width="60" height="12" rx="2" fill="#44403c"/>
    <text x="60" y="110" font-family="system-ui" font-size="7" fill="#a8a29e" text-anchor="middle" letter-spacing="2">ESPRESSO</text>
  </g>

  <!-- Coffee cup on counter -->
  <g transform="translate(370, 345)">
    <rect x="0" y="8" width="30" height="28" rx="3" fill="#f5f5f4" stroke="#d6d3d1" stroke-width="1"/>
    <ellipse cx="15" cy="8" rx="15" ry="6" fill="#fafaf9" stroke="#d6d3d1" stroke-width="0.5"/>
    <ellipse cx="15" cy="10" rx="11" ry="4" fill="#78350f"/>
    <path d="M30 16 Q38 16 38 22 Q38 28 30 28" fill="none" stroke="#d6d3d1" stroke-width="2"/>
    <!-- Saucer -->
    <ellipse cx="15" cy="36" rx="22" ry="5" fill="#e7e5e4" stroke="#d6d3d1" stroke-width="0.5"/>
  </g>

  <!-- === EDISON LAMPS === -->
  <!-- Lamp 1 - over counter left -->
  <g transform="translate(250, 0)">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#292524" stroke-width="2"/>
    <rect x="-6" y="55" width="12" height="8" rx="2" fill="#44403c"/>
    <!-- Bulb -->
    <ellipse cx="0" cy="80" rx="12" ry="18" fill="url(#lampBulb)" opacity="0.9"/>
    <!-- Filament -->
    <path d="M-4 72 Q0 78 4 72 M-3 76 Q0 82 3 76" fill="none" stroke="#fef3c7" stroke-width="0.8" opacity="0.7"/>
    <!-- Glow -->
    <ellipse cx="0" cy="80" rx="100" ry="100" fill="url(#lampGlow1)"/>
  </g>

  <!-- Lamp 2 - over chalkboard -->
  <g transform="translate(720, 0)">
    <line x1="0" y1="0" x2="0" y2="30" stroke="#292524" stroke-width="2"/>
    <rect x="-6" y="25" width="12" height="8" rx="2" fill="#44403c"/>
    <ellipse cx="0" cy="50" rx="12" ry="18" fill="url(#lampBulb)" opacity="0.9"/>
    <path d="M-4 42 Q0 48 4 42 M-3 46 Q0 52 3 46" fill="none" stroke="#fef3c7" stroke-width="0.8" opacity="0.7"/>
    <ellipse cx="0" cy="50" rx="120" ry="110" fill="url(#lampGlow2)"/>
  </g>

  <!-- Lamp 3 - over counter right -->
  <g transform="translate(1100, 0)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#292524" stroke-width="2"/>
    <rect x="-6" y="45" width="12" height="8" rx="2" fill="#44403c"/>
    <ellipse cx="0" cy="70" rx="12" ry="18" fill="url(#lampBulb)" opacity="0.9"/>
    <path d="M-4 62 Q0 68 4 62 M-3 66 Q0 72 3 66" fill="none" stroke="#fef3c7" stroke-width="0.8" opacity="0.7"/>
    <ellipse cx="0" cy="70" rx="100" ry="100" fill="url(#lampGlow1)"/>
  </g>

  <!-- === ANNOTATION BOXES === -->
  <!-- Left annotation box -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
    <text x="15" y="25" font-family="system-ui" font-size="11" font-weight="700" fill="#fbbf24">Меню-борд</text>
    <text x="15" y="43" font-family="system-ui" font-size="10" fill="#d1d5db">Все позиции — с русским</text>
    <text x="15" y="58" font-family="system-ui" font-size="10" fill="#d1d5db">переводом и ценами в &#8381;</text>
    <text x="15" y="73" font-family="system-ui" font-size="9" fill="#22c55e">&#10003; Соответствует 168-ФЗ</text>
  </g>
  <!-- Dashed line from left box to chalkboard -->
  <line x1="230" y1="240" x2="445" y2="200" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Right annotation box -->
  <g transform="translate(1210, 130)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
    <text x="15" y="25" font-family="system-ui" font-size="11" font-weight="700" fill="#fbbf24">Вывеска</text>
    <text x="15" y="43" font-family="system-ui" font-size="10" fill="#d1d5db">Название кофейни — на</text>
    <text x="15" y="58" font-family="system-ui" font-size="10" fill="#d1d5db">русском + оригинал</text>
    <text x="15" y="73" font-family="system-ui" font-size="9" fill="#22c55e">&#10003; Соответствует 168-ФЗ</text>
  </g>
  <!-- Dashed line from right box -->
  <line x1="1210" y1="170" x2="998" y2="200" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Right lower annotation box -->
  <g transform="translate(1210, 340)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
    <text x="15" y="25" font-family="system-ui" font-size="11" font-weight="700" fill="#fbbf24">Ценники</text>
    <text x="15" y="43" font-family="system-ui" font-size="10" fill="#d1d5db">Цены в рублях, описания</text>
    <text x="15" y="58" font-family="system-ui" font-size="10" fill="#d1d5db">блюд на русском языке</text>
    <text x="15" y="73" font-family="system-ui" font-size="9" fill="#22c55e">&#10003; Соответствует 168-ФЗ</text>
  </g>
  <!-- Dashed line from lower right box -->
  <line x1="1210" y1="380" x2="998" y2="340" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- === 168-FZ BADGE === -->
  <g transform="translate(1300, 30)">
    <rect x="0" y="0" width="110" height="44" rx="22" fill="url(#badgeGrad)" filter="url(#shadow)"/>
    <text x="55" y="20" font-family="system-ui" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">168-&#1060;&#1047;</text>
    <text x="55" y="36" font-family="system-ui" font-size="9" fill="#c7d2fe" text-anchor="middle">&#10003; compliant</text>
  </g>

  <!-- Warm vignette overlay -->
  <rect x="0" y="0" width="1440" height="600" fill="url(#lampGlow2)" opacity="0.08"/>

  <!-- Bottom gradient fade -->
  <rect x="0" y="480" width="1440" height="120" fill="#0f0e17" opacity="0.6"/>
</svg>