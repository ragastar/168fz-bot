<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="maLampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="35%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="maBulb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <pattern id="maBrick" x="0" y="0" width="52" height="26" patternUnits="userSpaceOnUse">
      <rect width="52" height="26" fill="#2a1a10"/>
      <rect x="0" y="0" width="24" height="11" rx="1" fill="#3d2517" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="26" y="0" width="24" height="11" rx="1" fill="#3a2215" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="-13" y="13" width="24" height="11" rx="1" fill="#362013" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="13" y="13" width="24" height="11" rx="1" fill="#3b2316" stroke="#1a0f08" stroke-width="0.5"/>
      <rect x="39" y="13" width="24" height="11" rx="1" fill="#382114" stroke="#1a0f08" stroke-width="0.5"/>
    </pattern>
    <filter id="maShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="maGreenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22c55e" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0f0e17"/>

  <!-- Brick wall -->
  <rect x="0" y="0" width="800" height="600" fill="url(#maBrick)"/>
  <rect x="0" y="0" width="800" height="600" fill="#0f0e17" opacity="0.15"/>

  <!-- Edison lamp - left side -->
  <g transform="translate(120, 0)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#292524" stroke-width="2.5"/>
    <rect x="-8" y="74" width="16" height="10" rx="3" fill="#44403c"/>
    <rect x="-3" y="68" width="6" height="8" rx="1" fill="#57534e"/>
    <ellipse cx="0" cy="105" rx="16" ry="22" fill="url(#maBulb)" opacity="0.85"/>
    <path d="M-5 96 Q0 103 5 96" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.8"/>
    <path d="M-4 100 Q0 107 4 100" fill="none" stroke="#fef3c7" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="88" x2="0" y2="95" stroke="#fef3c7" stroke-width="0.6" opacity="0.5"/>
    <ellipse cx="0" cy="105" rx="150" ry="140" fill="url(#maLampGlow)"/>
  </g>

  <!-- === CHALKBOARD === -->
  <g transform="translate(200, 60)" filter="url(#maShadow)">
    <!-- Board outer frame -->
    <rect x="-12" y="-12" width="524" height="484" rx="4" fill="#5c3a1e"/>
    <!-- Inner frame bevel -->
    <rect x="-6" y="-6" width="512" height="472" rx="3" fill="#4a2e16"/>
    <!-- Board surface -->
    <rect x="0" y="0" width="500" height="460" rx="2" fill="#1c1c1c"/>
    <!-- Chalk dust effect -->
    <rect x="0" y="0" width="500" height="460" rx="2" fill="#faf5eb" opacity="0.025"/>
    <ellipse cx="380" cy="400" rx="40" ry="20" fill="#faf5eb" opacity="0.015" transform="rotate(-15, 380, 400)"/>
    <ellipse cx="100" cy="50" rx="30" ry="15" fill="#faf5eb" opacity="0.01" transform="rotate(10, 100, 50)"/>

    <!-- Title -->
    <text x="250" y="40" font-family="system-ui" font-size="22" font-weight="700" fill="#fef3c7" text-anchor="middle" letter-spacing="4">&#1052;&#1045;&#1053;&#1070; / MENU</text>
    <line x1="50" y1="52" x2="160" y2="52" stroke="#fef3c7" stroke-width="0.8" opacity="0.3"/>
    <line x1="340" y1="52" x2="450" y2="52" stroke="#fef3c7" stroke-width="0.8" opacity="0.3"/>
    <text x="250" y="56" font-family="system-ui" font-size="8" fill="#fef3c7" text-anchor="middle" opacity="0.3">&#9830;</text>

    <!-- Coffee cup doodle -->
    <g transform="translate(430, 15)" opacity="0.2">
      <path d="M0 15 Q0 0 15 0 Q30 0 30 15 L28 25 L2 25 Z" fill="none" stroke="#fef3c7" stroke-width="1"/>
      <path d="M30 8 Q40 8 40 15 Q40 22 30 22" fill="none" stroke="#fef3c7" stroke-width="1"/>
      <path d="M8 -5 Q10 -12 12 -5 M14 -3 Q16 -10 18 -3 M20 -5 Q22 -12 24 -5" fill="none" stroke="#fef3c7" stroke-width="0.8"/>
    </g>

    <!-- Section: DRINKS / НАПИТКИ -->
    <text x="40" y="85" font-family="system-ui" font-size="13" font-weight="600" fill="#d97706" letter-spacing="2">&#1053;&#1040;&#1055;&#1048;&#1058;&#1050;&#1048; / DRINKS</text>
    <line x1="40" y1="92" x2="460" y2="92" stroke="#fef3c7" stroke-width="0.3" opacity="0.2"/>

    <!-- Espresso - bilingual -->
    <text x="40" y="122" font-family="system-ui" font-size="20" font-weight="700" fill="#fefce8">&#1069;&#1089;&#1087;&#1088;&#1077;&#1089;&#1089;&#1086;</text>
    <text x="40" y="139" font-family="system-ui" font-size="13" fill="#a8a29e">Espresso</text>
    <text x="460" y="130" font-family="system-ui" font-size="18" fill="#fbbf24" text-anchor="end">180 &#8381;</text>

    <!-- Latte - bilingual -->
    <text x="40" y="170" font-family="system-ui" font-size="20" font-weight="700" fill="#fefce8">&#1051;&#1072;&#1090;&#1090;&#1077;</text>
    <text x="40" y="187" font-family="system-ui" font-size="13" fill="#a8a29e">Latte</text>
    <text x="460" y="178" font-family="system-ui" font-size="18" fill="#fbbf24" text-anchor="end">280 &#8381;</text>

    <!-- Flat White - bilingual -->
    <text x="40" y="218" font-family="system-ui" font-size="20" font-weight="700" fill="#fefce8">&#1060;&#1083;&#1101;&#1090; &#1059;&#1072;&#1081;&#1090;</text>
    <text x="40" y="235" font-family="system-ui" font-size="13" fill="#a8a29e">Flat White</text>
    <text x="460" y="226" font-family="system-ui" font-size="18" fill="#fbbf24" text-anchor="end">320 &#8381;</text>

    <!-- Cappuccino - bilingual -->
    <text x="40" y="266" font-family="system-ui" font-size="20" font-weight="700" fill="#fefce8">&#1050;&#1072;&#1087;&#1091;&#1095;&#1080;&#1085;&#1086;</text>
    <text x="40" y="283" font-family="system-ui" font-size="13" fill="#a8a29e">Cappuccino</text>
    <text x="460" y="274" font-family="system-ui" font-size="18" fill="#fbbf24" text-anchor="end">250 &#8381;</text>

    <!-- Divider -->
    <line x1="40" y1="300" x2="460" y2="300" stroke="#fef3c7" stroke-width="0.8" opacity="0.25"/>
    <text x="250" y="304" font-family="system-ui" font-size="8" fill="#fef3c7" text-anchor="middle" opacity="0.25">&#9830;</text>

    <!-- Section: FOOD / ЕДА -->
    <text x="40" y="330" font-family="system-ui" font-size="13" font-weight="600" fill="#d97706" letter-spacing="2">&#1045;&#1044;&#1040; / FOOD</text>
    <line x1="40" y1="337" x2="460" y2="337" stroke="#fef3c7" stroke-width="0.3" opacity="0.2"/>

    <!-- Croissant - bilingual -->
    <text x="40" y="367" font-family="system-ui" font-size="20" font-weight="700" fill="#fefce8">&#1050;&#1088;&#1091;&#1072;&#1089;&#1089;&#1072;&#1085;</text>
    <text x="40" y="384" font-family="system-ui" font-size="13" fill="#a8a29e">Croissant</text>
    <text x="460" y="375" font-family="system-ui" font-size="18" fill="#fbbf24" text-anchor="end">200 &#8381;</text>

    <!-- Cheesecake - bilingual -->
    <text x="40" y="415" font-family="system-ui" font-size="20" font-weight="700" fill="#fefce8">&#1063;&#1080;&#1079;&#1082;&#1077;&#1081;&#1082;</text>
    <text x="40" y="432" font-family="system-ui" font-size="13" fill="#a8a29e">Cheesecake</text>
    <text x="460" y="423" font-family="system-ui" font-size="18" fill="#fbbf24" text-anchor="end">350 &#8381;</text>

    <!-- Chalk tray at bottom -->
    <rect x="-2" y="460" width="504" height="10" rx="2" fill="#4a2e16"/>
    <rect x="30" y="462" width="25" height="5" rx="2" fill="#e7e5e4" opacity="0.6" transform="rotate(-5, 42, 464)"/>
    <rect x="70" y="463" width="18" height="4" rx="2" fill="#fbbf24" opacity="0.5" transform="rotate(3, 79, 465)"/>
    <rect x="200" y="462" width="20" height="5" rx="2" fill="#e7e5e4" opacity="0.4"/>
  </g>

  <!-- === GREEN SUCCESS INDICATOR === -->
  <g transform="translate(650, 30)" filter="url(#maGreenGlow)">
    <rect x="0" y="0" width="120" height="48" rx="24" fill="#0f2918" stroke="#22c55e" stroke-width="2"/>
    <circle cx="28" cy="24" r="10" fill="#22c55e" opacity="0.2"/>
    <text x="28" y="29" font-family="system-ui" font-size="16" fill="#22c55e" text-anchor="middle">&#10003;</text>
    <text x="75" y="21" font-family="system-ui" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle">СООТВЕТСТВУЕТ</text>
    <text x="75" y="35" font-family="system-ui" font-size="9" fill="#86efac" text-anchor="middle">168-ФЗ</text>
  </g>

  <!-- Warm ambient light from lamp -->
  <rect x="0" y="0" width="250" height="600" fill="#f59e0b" opacity="0.03"/>
</svg>