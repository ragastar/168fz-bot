<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="na-wallTex" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1a1a2e"/>
      <rect x="0" y="0" width="20" height="20" fill="#1c1c30" opacity="0.4"/>
      <rect x="20" y="20" width="20" height="20" fill="#1e1e34" opacity="0.3"/>
    </pattern>
    <filter id="na-pinkNeon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="na-pinkGlowBig" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/></feMerge>
    </filter>
    <linearGradient id="na-glassReflect" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="na-daylight" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#374151" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <filter id="na-greenBorder" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22c55e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#111827"/>
  <rect width="800" height="600" fill="url(#na-daylight)"/>

  <!-- Sidewalk -->
  <rect x="0" y="490" width="800" height="110" fill="#1f2937"/>
  <rect x="0" y="490" width="800" height="2" fill="#374151" opacity="0.4"/>
  <line x1="0" y1="530" x2="800" y2="530" stroke="#2a3040" stroke-width="1" opacity="0.3"/>

  <!-- Building facade -->
  <rect x="80" y="50" width="640" height="440" rx="2" fill="#1e2238"/>
  <rect x="80" y="50" width="640" height="440" fill="url(#na-wallTex)" opacity="0.5"/>
  <rect x="80" y="50" width="640" height="440" rx="2" fill="none" stroke="#2d3348" stroke-width="1"/>

  <!-- Upper facade trim -->
  <rect x="80" y="50" width="640" height="8" fill="#252a40"/>

  <!-- BILINGUAL sign: Russian on top, English below -->
  <g transform="translate(400, 95)">
    <!-- Russian neon text -->
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#ec4899" opacity="0.3" filter="url(#na-pinkGlowBig)">Маникюрная студия</text>
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#ec4899" filter="url(#na-pinkNeon)">Маникюрная студия</text>
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#f9a8d4" opacity="0.35">Маникюрная студия</text>
    <!-- English text below, smaller -->
    <text x="0" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#9ca3af" opacity="0.7">Nail Bar</text>
  </g>

  <!-- Large glass window -->
  <rect x="120" y="180" width="370" height="290" rx="4" fill="#0d1117" stroke="#2d3348" stroke-width="2"/>
  <rect x="120" y="180" width="370" height="290" rx="4" fill="url(#na-glassReflect)"/>
  <!-- Interior - manicure table -->
  <rect x="200" y="360" width="120" height="50" rx="4" fill="#1a1a30" opacity="0.5"/>
  <rect x="220" y="350" width="80" height="12" rx="2" fill="#252540" opacity="0.4"/>
  <!-- Nail polish bottles -->
  <rect x="160" y="230" width="8" height="25" rx="2" fill="#ec4899" opacity="0.2"/>
  <rect x="175" y="228" width="8" height="27" rx="2" fill="#f472b6" opacity="0.15"/>
  <rect x="190" y="231" width="8" height="24" rx="2" fill="#db2777" opacity="0.18"/>
  <rect x="205" y="229" width="8" height="26" rx="2" fill="#ec4899" opacity="0.14"/>
  <!-- Shelf -->
  <rect x="150" y="256" width="80" height="3" rx="1" fill="#2d3348" opacity="0.4"/>
  <!-- Window decorations -->
  <circle cx="380" cy="260" r="18" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.2"/>
  <circle cx="420" cy="280" r="14" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.15"/>
  <!-- Reflection streak -->
  <line x1="140" y1="185" x2="180" y2="460" stroke="#ffffff" stroke-width="1" opacity="0.04"/>

  <!-- Door -->
  <rect x="530" y="190" width="140" height="290" rx="4" fill="#161a2e" stroke="#2d3348" stroke-width="2"/>
  <rect x="540" y="200" width="120" height="150" rx="2" fill="#0d1117"/>
  <rect x="540" y="200" width="120" height="150" rx="2" fill="url(#na-glassReflect)"/>
  <!-- Door handle -->
  <rect x="548" y="350" width="40" height="5" rx="2.5" fill="#6b7280"/>
  <!-- Door bottom -->
  <rect x="540" y="360" width="120" height="110" rx="2" fill="#1a1e32"/>

  <!-- Sandwich board - RUSSIAN -->
  <g transform="translate(100, 400)">
    <line x1="5" y1="0" x2="-5" y2="90" stroke="#4b5563" stroke-width="2"/>
    <line x1="65" y1="0" x2="75" y2="90" stroke="#4b5563" stroke-width="2"/>
    <rect x="0" y="0" width="70" height="80" rx="3" fill="#1a1a2e" stroke="#374151" stroke-width="1"/>
    <!-- Board content - Russian -->
    <text x="35" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e5e7eb">Гель-</text>
    <text x="35" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e5e7eb">маникюр</text>
    <line x1="10" y1="38" x2="60" y2="38" stroke="#374151" stroke-width="0.5"/>
    <text x="35" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e5e7eb">Педикюр</text>
    <line x1="10" y1="58" x2="60" y2="58" stroke="#374151" stroke-width="0.5"/>
    <text x="35" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#e5e7eb">Шеллак</text>
  </g>

  <!-- Step -->
  <rect x="510" y="480" width="180" height="12" rx="2" fill="#252a40" stroke="#2d3348" stroke-width="1"/>

  <!-- GREEN SUCCESS INDICATOR -->
  <rect x="3" y="3" width="794" height="594" rx="12" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.45" filter="url(#na-greenBorder)"/>

  <!-- Green checkmark badge -->
  <g transform="translate(680, 40)">
    <circle cx="40" cy="40" r="36" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="2"/>
    <circle cx="40" cy="40" r="28" fill="#0a1a0a"/>
    <polyline points="26,40 36,50 56,30" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Success label -->
  <g transform="translate(618, 120)">
    <rect x="0" y="0" width="144" height="32" rx="6" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="72" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#22c55e">Соответствует 168-ФЗ</text>
  </g>
</svg>